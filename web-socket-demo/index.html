<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Live Rig</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #121212;
        color: #ffffff;
      }
      #log {
        background: #000;
        padding: 10px;
        border: 1px solid #333;
        height: 300px;
        overflow-y: scroll;
      }
      .status-on {
        color: #00ff00;
      }
      .status-off {
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Broadcast Console</h1>
    <p id="status" class="status-off">Connecting....</p>

    <form id="message-form">
      <input
        type="text"
        id="message-input"
        placeholder="send cargo..."
        required
      />
      <button type="submit">Deploy Message</button>
    </form>
    <h3>Live Stream logs:</h3>
    <pre id="log"></pre>
  </body>


  <script>
    const statusEl=document.getElementById('status');
    const logEl=document.getElementById('log');
    const inputEl=document.getElementById('message-input');


    //1. Initiate the handshake with the ws server
    const socket =new  WebSocket('ws://localhost:8080');

    socket.addEventListener('open',()=>{
        statusEl.textContent=' CONNECTED: ws://localhost:8080';
        statusEl.className='status-on';
    })

  </script>


</html>
