<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket Live Rig</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background-color: #121212;
        color: #ffffff;
      }
      #log {
        background: #000;
        padding: 10px;
        border: 1px solid #333;
        height: 300px;
        overflow-y: scroll;
      }
      .status-on {
        color: #00ff00;
      }
      .status-off {
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <h1>WebSocket Broadcast Console</h1>
    <p id="status" class="status-off">Connecting....</p>

    <form id="message-form">
      <input
        type="text"
        id="message-input"
        placeholder="send cargo..."
        required
      />
      <button type="submit">Deploy Message</button>
    </form>
    <h3>Live Stream logs:</h3>
    <pre id="log"></pre>
  </body>

  <script>
    const status = document.getElementById("status");
    const log = document.getElementById("log");
    const input = document.getElementById("message-input");

    const appendLog = (label, message) => {
      const entry = `${new Date().toLocaleTimeString()} ${label}:${message}\n`;
      log.textContent = entry + log.textContent;
    };

    //1. Initiate the handshake with the ws server
    const socket = new WebSocket("ws://localhost:8080");

    //2.listen for open event
    socket.addEventListener("open", () => {
      status.textContent = " CONNECTED: ws://localhost:8080";
      status.className = "status-on";
      appendLog("[SYSTEM]", "Tunnel is established.");
    });

    //3. listen for closing event
    socket.addEventListener("close", () => {
      status.textContent = " DISCONNECTED ";
      status.className = "status-off";
      appendLog("[SYSTEM]", "Tunnel is closed .");
    });
    //4. listen for error event
    socket.addEventListener("error", (err) => {
      status.textContent = " ERROR ";
      status.className = "status-off";
      appendLog("[SYSTEM]", "Tunnel error: " + err.message);
    });

    socket.addEventListener("message", (e) => {
      appendLog("[RECEIVED]", e.data);
    });

    document
      .getElementById("message-form")
      .addEventListener("submit", (e) => {
        e.preventDefault()
        if(socket.readyState !== WebSocket.OPEN){
             appendLog("[ERROR ]", "No active tunnel found ."); 
        }
        const msg= input.value.trim()
        socket.send(msg);
        appendLog('[SENT]', msg); 
        input.value = "";
      });
  </script>
</html>
